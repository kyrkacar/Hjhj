<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Drawing - Pro (Lock & Flip)</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: black; touch-action: none; font-family: sans-serif; }
        #video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        
        /* Resim Katmanı */
        #container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center; z-index: 2;
        }
        #overlay {
            width: 250px; /* Başlangıç boyutu */
            opacity: 0.5;
            pointer-events: auto; /* Hareket ettirmek için */
            cursor: move;
            transform-origin: center;
            transition: transform 0.1s ease-out; /* Akıcı hareket */
        }

        /* Kontroller */
        .controls {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; flex-direction: column; align-items: center; 
            gap: 8px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 15px; width: 90%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .button-group { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        button { padding: 8px 15px; border-radius: 10px; border: none; background: #333; color: white; font-weight: bold; font-size: 12px; }
        button.active { background: #007bff; } /* Aktif buton rengi (Lock için) */
        
        input[type="range"] { width: 100%; margin-top: 5px; }
        label { color: white; font-size: 11px; margin-top: 5px; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>
    
    <div id="container">
        <img id="overlay" src="https://via.placeholder.com/300?text=Resim+Secin" alt="Çizim">
    </div>

    <div class="controls">
        <div class="button-group">
            <button onclick="document.getElementById('fileInput').click()">Resim Seç</button>
            <button id="lockBtn" onclick="toggleLock()">🔒 Kilitle</button>
            <button onclick="toggleFlip()">↔ Aynala</button>
            <button onclick="resetImage()">Sıfırla</button>
        </div>
        
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        
        <label>Saydamlık</label>
        <input type="range" id="opacity" min="0.1" max="1" step="0.1" value="0.5">
    </div>
