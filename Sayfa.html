<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kendi AR Drawing Uygulamam</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
        
        /* En alt katman: Kamera */
        #video {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover; z-index: 1;
        }

        /* Orta katman: Çizilecek Resim */
        #overlay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; opacity: 0.5; z-index: 2;
            pointer-events: none; /* Resme dokunmayı engeller, alttaki kontrollere basabilirsin */
        }

        /* Üst katman: Kontroller */
        .controls {
            position: fixed; bottom: 20px; left: 0; width: 100%;
            z-index: 3; display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        
        input[type="range"] { width: 80%; }
        button { padding: 10px 20px; border-radius: 20px; border: none; background: white; font-weight: bold; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>
    <img id="overlay" src="https://via.placeholder.com/300" alt="Resim Seçilmedi">

    <div class="controls">
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        <button onclick="document.getElementById('fileInput').click()">Resim Seç</button>
        <label style="color: white;">Saydamlık:</label>
        <input type="range" id="opacity" min="0" max="1" step="0.1" value="0.5">
    </div>

    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const fileInput = document.getElementById('fileInput');
        const opacitySlider = document.getElementById('opacity');

        // Kamerayı Başlat
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Kamera izni verilmedi: " + err);
            }
        }

        // Resim Yükle
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                overlay.src = URL.createObjectURL(file);
            }
        });

        // Saydamlığı Ayarla
        opacitySlider.addEventListener('input', (e) => {
            overlay.style.opacity = e.target.value;
        });

        startCamera();
    </script>
</body>
</html>
